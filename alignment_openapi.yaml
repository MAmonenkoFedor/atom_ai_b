openapi: 3.0.3
info:
  title: ATOM AI Backend API
  version: 1.0.0
  description: API contract for ATOM AI Workspace
paths:
  /api/admin/actions/events:
    get:
      operationId: adminActionEventsList
      description: When `cursor` is provided, endpoint uses cursor pagination with
        stable ordering (`timestamp/created_at` desc, then `id` desc). When `cursor`
        is not provided, classic `page/page_size` mode is used.
      parameters:
      - in: query
        name: action
        schema:
          type: string
      - in: query
        name: actor
        schema:
          type: string
      - in: query
        name: cursor
        schema:
          type: string
        description: 'Cursor-based pagination token. Format: `YYYY-MM-DDTHH:MM:SSZ::<id>`.
          Pass empty cursor (`cursor=`) for the first page. Use `next_cursor` from
          response to request the next page.'
      - in: query
        name: from
        schema:
          type: string
          format: date-time
      - in: query
        name: page
        schema:
          type: integer
      - in: query
        name: page_size
        schema:
          type: integer
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: scope
        schema:
          type: string
      - in: query
        name: severity
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
      - in: query
        name: to
        schema:
          type: string
          format: date-time
      tags:
      - admin
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionListResponse'
              examples:
                CursorRequestExample:
                  value:
                    request: /api/admin/actions/events?cursor=&page_size=2
                    response:
                      count: 3
                      results:
                      - id: 103
                        timestamp: '2026-04-15T10:20:00Z'
                        scope: platform
                        severity: critical
                        status: failed
                        action: invite_revoke
                        actor: security@platform.com
                        details:
                          invite_id: 2001
                      page: 1
                      page_size: 2
                      next_cursor: 2026-04-15T10:10:00Z::102
                  summary: First cursor page
                CursorNextPageExample:
                  value:
                    request: /api/admin/actions/events?cursor=2026-04-15T10:10:00Z::102&page_size=2
                    response:
                      count: 3
                      results:
                      - id: 101
                        timestamp: '2026-04-15T10:00:00Z'
                        scope: company
                        severity: medium
                        status: success
                        action: user_role_update
                        actor: admin@company.com
                        details:
                          target_user_id: 13
                      page: 1
                      page_size: 2
                      next_cursor: null
                  summary: Second cursor page
          description: ''
  /api/admin/actions/events/{action_id}:
    get:
      operationId: adminActionDetail
