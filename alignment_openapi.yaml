components:
  schemas:
    Activity:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        timestamp:
          type: string
      required:
      - id
      - timestamp
      - title
      - type
    ActorTypeEnum:
      enum:
      - user
      - system
      - integration
      type: string
      description: |-
        * `user` - user
        * `system` - system
        * `integration` - integration
    AdminActionEvent:
      type: object
      properties:
        id:
          type: integer
        timestamp:
          type: string
          format: date-time
        scope:
          $ref: '#/components/schemas/ScopeEnum'
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        status:
          $ref: '#/components/schemas/RequestStatusEnum'
        action:
          type: string
        actor:
          type: string
        details:
          type: object
          additionalProperties: {}
      required:
      - action
      - actor
      - details
      - id
      - scope
      - severity
      - status
      - timestamp
    AdminActionListResponse:
      type: object
      properties:
        count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/AdminActionEvent'
        page:
          type: integer
        page_size:
          type: integer
        next_cursor:
          type: string
          nullable: true
      required:
      - count
      - next_cursor
      - page
      - page_size
      - results
    AdminActionStats:
      type: object
      properties:
        total_events:
          type: integer
        failed_events:
          type: integer
        critical_events:
          type: integer
      required:
      - critical_events
      - failed_events
      - total_events
    AuthLogin:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - password
    BuildingDetail:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        departments:
          type: array
          items:
            $ref: '#/components/schemas/Department'
      required:
      - departments
      - id
      - name
    BuildingListItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        floors:
          type: integer
        employees:
          type: integer
        online_now:
          type: integer
        risky_tasks:
          type: integer
        overdue_tasks:
          type: integer
        color:
          type: string
        height_ratio:
          type: number
          format: double
        latest_event:
          type: string
        logo:
          type: string
      required:
      - color
      - employees
      - floors
      - height_ratio
      - id
      - latest_event
      - logo
      - name
      - online_now
      - overdue_tasks
      - risky_tasks
      - status
